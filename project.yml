name: VoiceDo
options:
  bundleIdPrefix: com.shrirajpatil
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    ENABLE_STRICT_OBJC_MSGSEND: YES
    CLANG_ENABLE_MODULES: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  VoiceDoShared:
    path: Packages/VoiceDoShared

targets:
  VoiceDo:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VoiceDo
        excludes:
          - "**/.DS_Store"
    resources:
      - path: VoiceDo/Assets.xcassets
        optional: true
      - path: VoiceDo/VoiceDo.entitlements
        optional: true
    dependencies:
      - package: VoiceDoShared
      - target: VoiceDoWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shrirajpatil.voicedo
        INFOPLIST_FILE: VoiceDo/Info.plist
        CODE_SIGN_ENTITLEMENTS: VoiceDo/VoiceDo.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
        Release:
          SWIFT_TREAT_WARNINGS_AS_ERRORS: YES

  VoiceDoWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VoiceDoWidget
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: VoiceDoShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shrirajpatil.voicedo.widget
        INFOPLIST_FILE: VoiceDoWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: VoiceDoWidget/VoiceDoWidget.entitlements
        SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

  VoiceDoTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VoiceDoTests
    dependencies:
      - target: VoiceDo
      - package: VoiceDoShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shrirajpatil.voicedo.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

schemes:
  VoiceDo:
    build:
      targets:
        VoiceDo: all
        VoiceDoWidget: all
        VoiceDoTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VoiceDoTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
